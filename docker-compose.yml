version: '3.8'

services:
  # 1. PostgreSQL (Core Data)
  postgres:
    image: postgres:15-alpine
    container_name: logicforge-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-logicforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logicforge-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. MongoDB (Auth Data)
  mongo:
    image: mongo:6.0
    container_name: logicforge-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    volumes:
      - mongo_data:/data/db
    networks:
      - logicforge-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  # 3. Redis (Cache)
  redis:
    image: redis:7-alpine
    container_name: logicforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - logicforge-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 4. Code Execution Sandbox Service
  code-runner:
    build:
      context: ./apps/code-runner
      dockerfile: Dockerfile
    container_name: logicforge-code-runner
    ports:
      - "3004:3004"
    environment:
      - PORT_CODE_RUNNER=3004
      - NODE_ENV=development
    networks:
      - logicforge-net

  # 5. Question Engine
  question-engine:
    build:
      context: .
      dockerfile: apps/question-engine/Dockerfile
    container_name: logicforge-question-engine
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/logicforge?schema=public
      MONGO_URL: mongodb://admin:password@mongo:27017/logicforge_auth?authSource=admin
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-me}
      PORT_QUESTION_ENGINE: 3002
      NODE_ENV: development
      INTER_SERVICE_SECRET: ${INTER_SERVICE_SECRET:-dev-inter-service-secret}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - logicforge-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # 6. Game API (HTTP + WebSocket)
  game-api:
    build:
      context: .
      dockerfile: apps/game-api/Dockerfile
    container_name: logicforge-game-api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/logicforge?schema=public
      MONGO_URL: mongodb://admin:password@mongo:27017/logicforge_auth?authSource=admin
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-me}
      PORT_GAME_API: 3001
      NODE_ENV: development
      QUESTION_ENGINE_URL: http://question-engine:3002
      CODE_RUNNER_URL: http://code-runner:3004
      ANTI_CHEAT_URL: http://localhost:3003
      INTER_SERVICE_SECRET: ${INTER_SERVICE_SECRET:-dev-inter-service-secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      question-engine:
        condition: service_healthy
      code-runner:
        condition: service_started
    networks:
      - logicforge-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # 7. Web Frontend (Next.js)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_GAME_API_URL: http://localhost:3001
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    container_name: logicforge-web
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/logicforge?schema=public
      MONGO_URL: mongodb://admin:password@mongo:27017/logicforge_auth?authSource=admin
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-me}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_ID: ${GITHUB_ID}
      GITHUB_SECRET: ${GITHUB_SECRET}
      GAME_API_URL: http://game-api:3001
      QUESTION_ENGINE_URL: http://question-engine:3002
      INTER_SERVICE_SECRET: ${INTER_SERVICE_SECRET:-dev-inter-service-secret}
      NODE_ENV: development
    depends_on:
      game-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - logicforge-net


volumes:
  postgres_data:
  mongo_data:
  redis_data:

networks:
  logicforge-net:
    driver: bridge