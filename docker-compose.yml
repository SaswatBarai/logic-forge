version: '3.8'

services:
  # 1. PostgreSQL (Core Data)
  postgres:
    image: postgres:15-alpine
    container_name: logicforge-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-logicforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logicforge-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. MongoDB (Auth Data)
  mongo:
    image: mongo:6.0
    container_name: logicforge-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    volumes:
      - mongo_data:/data/db
    networks:
      - logicforge-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  # 3. Redis (Cache)
  redis:
    image: redis:7-alpine
    container_name: logicforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - logicforge-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data:
  redis_data:

networks:
  logicforge-net:
    driver: bridge